<!DOCTYPE html>

<style>

    background: #ffffff;
    display: flex;

    justify-content: center;
  }
  .card-wrapper {
    position: relative;
    width: 100%;
    max-width: 1000px;

    display: block;

    height: auto;

    position: absolute;
    cursor: pointer;
    border-bottom: 2px solid #1a73e8;
  }
  .hotspot:hover {
    background: rgba(26,115,232,0.08);
  }

  /* مواقع النقاط الفعالة كنسب مئوية من أبعاد الصورة الأصلية 1600×913 */

    top: 85.2%;

  }
  .website {
    left: 36.9%;
    top: 85.2%;
    width: 17.5%;
    height: 3.7%;
  }

    top: 91.6%;
    width: 17.5%;

<div class="card-wrapper">

  <!-- البريد الإلكتروني: يفتح تطبيق البريد -->
